<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Diary</title>
  <style>
    :root {
      --bg: #eef1f7;
      --surface: #ffffff;
      --surface-muted: #f6f8fb;
      --border: #e3e7ef;
      --text: #17203a;
      --text-muted: #6b7280;
      --primary: #2a78d6;
      --primary-dark: #1f5fac;
      --accent: #1baf7a;
      --danger: #d9433f;
      --weekend: #d9433f;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06), 0 8px 24px rgba(16, 24, 40, 0.08);
    }
    :root[data-theme="dark"] {
      --bg: #0f1420;
      --surface: #1a2130;
      --surface-muted: #232b3d;
      --border: #313b52;
      --text: #eef1f8;
      --text-muted: #8792a8;
      --primary: #5b9ee8;
      --primary-dark: #86b9ee;
      --accent: #33d497;
      --danger: #f2726f;
      --weekend: #f2726f;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px 12px 48px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* ------------------------------- Header ------------------------------ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 24px;
      margin: 0;
      text-align: center;
      flex: 1;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin: 4px 0 18px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
    }
    .switch { position: relative; display: inline-block; width: 36px; height: 21px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .switch-slider::before {
      content: "";
      position: absolute;
      height: 15px; width: 15px; left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .switch input:checked + .switch-slider { background: var(--primary); }
    .switch input:checked + .switch-slider::before { transform: translateX(15px); }

    /* ------------------------------- Cards ------------------------------- */
    .card {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px 18px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    .card h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    /* ------------------------------ New entry ---------------------------- */
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }
    .btn {
      padding: 9px 16px;
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn-outline {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .entry-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .save-hint { font-size: 12px; color: var(--text-muted); }

    /* ---------------------------- View controls -------------------------- */
    .view-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .view-controls input[type="date"] {
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color-scheme: light;
    }
    :root[data-theme="dark"] .view-controls input[type="date"] { color-scheme: dark; }
    .selected-date-label {
      font-weight: 700;
      font-size: 14px;
    }
    .selected-date-label.weekend { color: var(--weekend); }

    /* ------------------------------ Entries ------------------------------ */
    .entry-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 4px;
      border-bottom: 1px dashed var(--border);
      font-size: 14px;
      line-height: 1.5;
    }
    .entry-line:last-child { border-bottom: none; }
    .entry-time {
      flex: none;
      font-size: 11.5px;
      color: var(--text-muted);
      font-family: "Consolas", "Courier New", monospace;
      padding-top: 2px;
      white-space: nowrap;
    }
    .entry-elapsed {
      flex: none;
      font-size: 10.5px;
      color: var(--accent);
      font-family: "Consolas", "Courier New", monospace;
      padding: 1px 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      white-space: nowrap;
    }
    .entry-text { flex: 1; word-break: break-word; white-space: pre-wrap; }
    .entry-edit,
    .entry-delete {
      flex: none;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      padding: 0 4px;
      line-height: 1.4;
    }
    .entry-edit:hover { color: var(--accent, #3a7bfd); }
    .entry-delete:hover { color: var(--danger); }
    .entry-edit-textarea {
      flex: 1;
      font: inherit;
      color: inherit;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      resize: vertical;
      min-height: 44px;
    }
    .entry-edit-save,
    .entry-edit-cancel {
      flex: none;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12.5px;
      cursor: pointer;
    }
    .entry-edit-save { background: var(--accent, #3a7bfd); color: #fff; }
    .entry-edit-cancel { background: var(--surface-muted); color: var(--text-muted); }
    .no-entries {
      color: var(--text-muted);
      font-size: 13.5px;
      font-style: italic;
      padding: 8px 0;
    }
    .entry-group + .entry-group { margin-top: 14px; }
    .entry-group-heading {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-muted, rgba(127,127,127,0.08));
      border-radius: 6px;
      padding: 4px 8px;
      margin-bottom: 2px;
    }
    .entry-group-insight {
      font-size: 12.5px;
      color: var(--text-muted);
      padding: 6px 8px 8px;
      line-height: 1.5;
      border-left: 3px solid var(--accent);
      margin: 2px 0 6px;
    }
    .entry-group-insight strong { color: inherit; font-weight: 700; }
    .entry-group-insight .insight-highlight { color: var(--accent); font-weight: 700; }

    /* ------------------------------ Calendar ------------------------------ */
    #calendarSection { display: none; }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-title { font-weight: 700; font-size: 15px; }
    .cal-nav {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 4px 12px;
      font-size: 14px;
    }
    .cal-nav:hover { border-color: var(--primary); color: var(--primary); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 4px 0;
    }
    .cal-dow.weekend { color: var(--weekend); }
    .cal-day {
      position: relative;
      text-align: center;
      padding: 8px 0 12px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--surface-muted);
      color: var(--text);
    }
    .cal-day:hover { border-color: var(--primary); }
    .cal-day.empty { background: none; cursor: default; }
    .cal-day.empty:hover { border-color: transparent; }
    .cal-day.weekend { color: var(--weekend); font-weight: 700; }
    .cal-day.today { border-color: var(--accent); font-weight: 700; }
    .cal-day.selected { background: var(--primary); color: #fff; }
    .cal-day.selected.weekend { color: #ffd9d9; }
    .cal-day .dot {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ------------------------------ Summary ------------------------------- */
    #summaryPanel {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px;
    }
    #summaryPanel h4 {
      margin: 0 0 8px;
      font-size: 13.5px;
    }
    .summary-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 12.5px;
    }
    .summary-stats strong { color: var(--text); }
    .summary-timeline {
      margin: 6px 0 0;
      padding-left: 18px;
    }
    .summary-timeline li {
      margin-bottom: 4px;
      line-height: 1.45;
    }
    .summary-timeline .t {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 11.5px;
      color: var(--text-muted);
      margin-right: 6px;
    }
    #aiSummarySection {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }
    #aiSummaryText {
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .ai-note {
      font-size: 12px;
      color: var(--text-muted);
    }
    .ai-key-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .ai-key-row input {
      flex: 1;
      min-width: 180px;
      padding: 7px 10px;
      font-size: 12.5px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 12.5px;
    }

    /* --------------------------- Backup / restore ------------------------- */
    .backup-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .backup-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    #restoreFileInput { display: none; }

    @media (max-width: 480px) {
      .entry-time { font-size: 10.5px; }
      .entry-elapsed { font-size: 9.5px; padding: 1px 5px; }
      .cal-day { font-size: 12px; padding: 6px 0 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="theme-toggle">
        <span>☀️</span>
        <label class="switch">
          <input type="checkbox" id="themeToggle">
          <span class="switch-slider"></span>
        </label>
        <span>🌙</span>
      </div>
      <h1>📔 Life Diary</h1>
      <button class="btn-outline btn" id="calendarToggleBtn" type="button">📅 Calendar</button>
    </div>
    <p class="subtitle">One place for your daily thoughts — saved privately on this device.</p>

    <!-- Calendar (hidden until toggled) -->
    <div class="card" id="calendarSection">
      <div class="cal-header">
        <button class="cal-nav" id="calPrevBtn" type="button">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="cal-nav" id="calNextBtn" type="button">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- New entry -->
    <div class="card">
      <h3>✍️ New Entry</h3>
      <textarea id="entryInput" placeholder="Write what's on your mind..."></textarea>
      <div class="entry-actions">
        <span class="save-hint">Date &amp; time are stamped automatically when you save.</span>
        <button class="btn" id="addEntryBtn" type="button">Save Entry</button>
      </div>
    </div>

    <!-- View entries by date -->
    <div class="card">
      <h3>📖 Diary Entries</h3>
      <div class="view-controls">
        <input type="date" id="viewDateInput">
        <button class="btn-outline btn" id="todayBtn" type="button">Today</button>
        <button class="btn btn-small" id="summaryBtn" type="button">✨ Summary</button>
        <span class="selected-date-label" id="selectedDateLabel"></span>
      </div>
      <div id="entriesList" style="margin-top: 12px;"></div>

      <div id="summaryPanel">
        <h4>📋 How the day went — <span id="summaryDateLabel"></span></h4>
        <div class="summary-stats" id="summaryStats"></div>
        <ol class="summary-timeline" id="summaryTimeline"></ol>

        <div id="aiSummarySection">
          <h4>🤖 AI Summary</h4>
          <div id="aiSummaryText" style="display: none;"></div>
          <p class="ai-note" id="aiStatusNote"></p>
          <div class="ai-key-row" id="aiKeyRow" style="display: none;">
            <input type="password" id="apiKeyInput" placeholder="AIza... (free Gemini key from aistudio.google.com)">
            <button class="btn btn-small" id="saveApiKeyBtn" type="button">Save Key</button>
          </div>
          <p class="ai-note" id="aiKeyManageRow" style="display: none;">
            <a href="#" id="clearApiKeyLink">Remove saved API key</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Backup / restore -->
    <div class="card">
      <h3>💾 Backup &amp; Restore</h3>
      <div class="backup-row">
        <button class="btn" id="backupBtn" type="button">💾 Backup</button>
        <button class="btn-outline btn" id="restoreBtn" type="button">⬆️ Restore from File</button>
        <button class="btn-outline btn" id="resumeBackupBtn" type="button" style="display: none;">▶️ Resume Auto-Backup</button>
        <input type="file" id="restoreFileInput" accept=".json,application/json">
      </div>
      <p class="backup-note" id="backupStatusNote"></p>
      <p class="backup-note" id="backupOffRow" style="display: none;"><a href="#" id="disableBackupLink">Turn off auto-backup</a></p>
    </div>
  </div>

  <script>
    // ------------------------------ Storage -------------------------------
    // Shape: { "YYYY-MM-DD": [ { t: <ISO timestamp>, text: <string> }, ... ] }
    const STORAGE_KEY = 'life_diary_entries';
    const THEME_KEY = 'life_diary_theme';

    function loadEntries() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      // Every change (new entry, delete, restore) flows through here, so
      // this one hook keeps the on-disk backup file current automatically.
      scheduleAutoBackup();
    }

    function dateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function isWeekendKey(key) {
      const d = new Date(key + 'T12:00:00');
      const dow = d.getDay();
      return dow === 0 || dow === 6; // Sunday or Saturday
    }

    // ------------------------------- Theme --------------------------------
    (function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const dark = saved ? saved === 'dark'
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').checked = dark;
    })();

    document.getElementById('themeToggle').addEventListener('change', function () {
      if (this.checked) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem(THEME_KEY, 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem(THEME_KEY, 'light');
      }
    });

    // ---------------------------- Add an entry ----------------------------
    document.getElementById('addEntryBtn').addEventListener('click', () => {
      const input = document.getElementById('entryInput');
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }
      const now = new Date();
      const key = dateKey(now);
      const entries = loadEntries();
      if (!entries[key]) entries[key] = [];
      entries[key].push({ t: now.toISOString(), text });
      saveEntries(entries);
      input.value = '';

      // Jump the view to today so the new entry is immediately visible.
      document.getElementById('viewDateInput').value = key;
      renderEntries();
      renderCalendar();
    });

    // ------------------------- View entries by date -----------------------
    const viewDateInput = document.getElementById('viewDateInput');
    viewDateInput.value = dateKey(new Date());
    viewDateInput.addEventListener('change', () => {
      renderEntries();
      renderCalendar();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      viewDateInput.value = dateKey(new Date());
      renderEntries();
      renderCalendar();
    });

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const THREE_HOUR_BLOCK_LABELS = [
      '12:00 AM – 3:00 AM', '3:00 AM – 6:00 AM',
      '6:00 AM – 9:00 AM', '9:00 AM – 12:00 PM',
      '12:00 PM – 3:00 PM', '3:00 PM – 6:00 PM',
      '6:00 PM – 9:00 PM', '9:00 PM – 12:00 AM'
    ];

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      const pad = (n) => String(n).padStart(2, '0');
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    // Each entry's timer starts at 00:00:00 when it's added and keeps
    // ticking until the next entry is added, at which point it freezes
    // (showing how long that entry "ran" for) and the next entry's timer
    // starts from zero. Flattened across all dates so it works across day
    // boundaries too.
    function buildEntryTimerInfo(allEntries) {
      const flat = [];
      for (const k in allEntries) {
        allEntries[k].forEach((e) => flat.push(e.t));
      }
      flat.sort();
      const frozenElapsed = {};
      flat.forEach((t, i) => {
        if (i < flat.length - 1) {
          frozenElapsed[t] = new Date(flat[i + 1]) - new Date(t);
        }
      });
      const latestTimestamp = flat.length ? flat[flat.length - 1] : null;
      return { frozenElapsed, latestTimestamp };
    }

    let liveEntryTimerId = null;

    function formatDurationHuman(ms) {
      const totalMinutes = Math.round(ms / 60000);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h === 0 && m === 0) return '<1m';
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    // Live ms for an entry: frozen duration if a later entry already exists,
    // or "now minus its timestamp" if it's still the running latest entry.
    function currentElapsedForEntry(e, frozenElapsed, latestTimestamp) {
      return e.t === latestTimestamp
        ? (Date.now() - new Date(e.t).getTime())
        : (frozenElapsed[e.t] || 0);
    }

    function computeBlockStats(blockEntries, frozenElapsed, latestTimestamp) {
      let totalMs = 0;
      let busiest = null;
      blockEntries.forEach((e) => {
        const ms = currentElapsedForEntry(e, frozenElapsed, latestTimestamp);
        totalMs += ms;
        if (!busiest || ms > busiest.ms) busiest = { ms, text: e.text };
      });
      return { totalMs, count: blockEntries.length, avgMs: totalMs / blockEntries.length, busiest };
    }

    function groupEntriesByThreeHours(dayEntries) {
      const blocks = THREE_HOUR_BLOCK_LABELS.map(() => []);
      dayEntries.forEach((e, i) => {
        const hour = new Date(e.t).getHours();
        blocks[Math.floor(hour / 3)].push({ ...e, index: i });
      });
      return blocks;
    }

    function renderEntries() {
      const key = viewDateInput.value;
      const label = document.getElementById('selectedDateLabel');
      const list = document.getElementById('entriesList');

      const d = new Date(key + 'T12:00:00');
      label.textContent = d.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      label.classList.toggle('weekend', isWeekendKey(key));

      const entries = loadEntries();
      const dayEntries = entries[key] || [];

      if (liveEntryTimerId) { clearInterval(liveEntryTimerId); liveEntryTimerId = null; }

      if (dayEntries.length === 0) {
        list.innerHTML = '<p class="no-entries">No entries for this date.</p>';
        return;
      }

      const blocks = groupEntriesByThreeHours(dayEntries);
      const { frozenElapsed, latestTimestamp } = buildEntryTimerInfo(entries);

      list.innerHTML = blocks.map((blockEntries, b) => {
        if (blockEntries.length === 0) return '';
        return `
        <div class="entry-group">
          <div class="entry-group-heading">${THREE_HOUR_BLOCK_LABELS[b]}</div>
          <div class="entry-group-insight" data-block="${b}">
            ⏳ <strong><span class="insight-total"></span></strong> tracked across ${blockEntries.length} entr${blockEntries.length === 1 ? 'y' : 'ies'}
            — <span class="insight-highlight"><span class="insight-pct"></span></span> of today's tracked time.
            Avg <span class="insight-avg"></span> per entry.
            <span class="insight-longest"></span>
          </div>
          ${blockEntries.map((e) => {
            const isLive = e.t === latestTimestamp;
            const badge = isLive
              ? `<span class="entry-elapsed" data-timer-t="${e.t}" title="Running -- this is the latest entry">⏱ 00:00:00</span>`
              : `<span class="entry-elapsed" title="How long this entry ran before the next one was added">⏱ ${formatDuration(frozenElapsed[e.t] || 0)}</span>`;
            return `
          <div class="entry-line" data-index="${e.index}">
            <span class="entry-time">${formatTime(e.t)}</span>
            ${badge}
            <span class="entry-text" data-index="${e.index}"></span>
            <button class="entry-edit" data-index="${e.index}" title="Edit this entry" type="button">✏️</button>
            <button class="entry-delete" data-index="${e.index}" title="Delete this entry" type="button">✕</button>
          </div>`;
          }).join('')}
        </div>`;
      }).join('');

      // Entry text is user content -- assign via textContent, never innerHTML.
      list.querySelectorAll('.entry-text').forEach((span) => {
        span.textContent = dayEntries[parseInt(span.dataset.index)].text;
      });

      function refreshGroupInsights() {
        const perBlockStats = blocks.map((blockEntries) =>
          blockEntries.length ? computeBlockStats(blockEntries, frozenElapsed, latestTimestamp) : null
        );
        const dayTotalMs = perBlockStats.reduce((sum, s) => sum + (s ? s.totalMs : 0), 0);

        list.querySelectorAll('.entry-group-insight[data-block]').forEach((el) => {
          const b = parseInt(el.dataset.block);
          const stats = perBlockStats[b];
          if (!stats) return;

          const pct = dayTotalMs > 0 ? Math.round((stats.totalMs / dayTotalMs) * 100) : 0;
          el.querySelector('.insight-total').textContent = formatDurationHuman(stats.totalMs);
          el.querySelector('.insight-pct').textContent = `${pct}%`;
          el.querySelector('.insight-avg').textContent = formatDurationHuman(stats.avgMs);

          const longestEl = el.querySelector('.insight-longest');
          if (stats.busiest && stats.busiest.ms > 0 && stats.count > 1) {
            longestEl.textContent = `Longest stretch: ${formatDurationHuman(stats.busiest.ms)} on "${stats.busiest.text}".`;
          } else {
            longestEl.textContent = '';
          }
        });
      }

      refreshGroupInsights();

      const liveBadge = list.querySelector('[data-timer-t]');
      if (liveBadge) {
        const startTime = new Date(liveBadge.dataset.timerT).getTime();
        liveEntryTimerId = setInterval(() => {
          liveBadge.textContent = `⏱ ${formatDuration(Date.now() - startTime)}`;
          refreshGroupInsights();
        }, 1000);
      }

      list.querySelectorAll('.entry-delete').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (!confirm('Delete this entry?')) return;
          const all = loadEntries();
          all[key].splice(parseInt(btn.dataset.index), 1);
          if (all[key].length === 0) delete all[key];
          saveEntries(all);
          renderEntries();
          renderCalendar();
        });
      });

      list.querySelectorAll('.entry-edit').forEach((btn) => {
        btn.addEventListener('click', () => {
          const index = parseInt(btn.dataset.index);
          startEditingEntry(key, index);
        });
      });
    }

    function startEditingEntry(key, index) {
      const line = document.querySelector(`.entry-line[data-index="${index}"]`);
      if (!line) return;
      const entries = loadEntries();
      const entry = entries[key][index];

      line.innerHTML = `
        <span class="entry-time">${formatTime(entry.t)}</span>
        <textarea class="entry-edit-textarea"></textarea>
        <button class="entry-edit-save" type="button">Save</button>
        <button class="entry-edit-cancel" type="button">Cancel</button>`;

      const textarea = line.querySelector('.entry-edit-textarea');
      textarea.value = entry.text; // user content -- .value, not innerHTML
      textarea.focus();
      textarea.setSelectionRange(textarea.value.length, textarea.value.length);

      line.querySelector('.entry-edit-save').addEventListener('click', () => {
        const newText = textarea.value.trim();
        if (!newText) { alert('Entry text cannot be empty.'); return; }
        const all = loadEntries();
        all[key][index].text = newText;
        saveEntries(all);
        renderEntries();
        renderCalendar();
      });

      line.querySelector('.entry-edit-cancel').addEventListener('click', () => {
        renderEntries();
      });
    }

    // ------------------------------ Calendar ------------------------------
    let calYear, calMonth; // currently displayed month

    (function initCalendarMonth() {
      const today = new Date();
      calYear = today.getFullYear();
      calMonth = today.getMonth();
    })();

    document.getElementById('calendarToggleBtn').addEventListener('click', () => {
      const section = document.getElementById('calendarSection');
      const showing = section.style.display === 'block';
      section.style.display = showing ? 'none' : 'block';
      if (!showing) {
        // Re-open on the month of the currently selected date.
        const sel = new Date(viewDateInput.value + 'T12:00:00');
        calYear = sel.getFullYear();
        calMonth = sel.getMonth();
        renderCalendar();
      }
    });

    document.getElementById('calPrevBtn').addEventListener('click', () => {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    });

    document.getElementById('calNextBtn').addEventListener('click', () => {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    });

    function renderCalendar() {
      const grid = document.getElementById('calGrid');
      const title = document.getElementById('calTitle');
      const entries = loadEntries();
      const todayKey = dateKey(new Date());
      const selectedKey = viewDateInput.value;

      title.textContent = new Date(calYear, calMonth, 1)
        .toLocaleDateString([], { month: 'long', year: 'numeric' });

      const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let html = dows.map((d, i) =>
        `<div class="cal-dow${i === 0 || i === 6 ? ' weekend' : ''}">${d}</div>`).join('');

      const firstDow = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

      for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';

      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(new Date(calYear, calMonth, day));
        const classes = ['cal-day'];
        if (isWeekendKey(key)) classes.push('weekend');
        if (key === todayKey) classes.push('today');
        if (key === selectedKey) classes.push('selected');
        const dot = entries[key] && entries[key].length > 0 ? '<span class="dot"></span>' : '';
        html += `<div class="${classes.join(' ')}" data-key="${key}">${day}${dot}</div>`;
      }

      grid.innerHTML = html;

      grid.querySelectorAll('.cal-day:not(.empty)').forEach((cell) => {
        cell.addEventListener('click', () => {
          viewDateInput.value = cell.dataset.key;
          renderEntries();
          renderCalendar();
        });
      });
    }

    // --------------------------- Backup / restore -------------------------
    // Auto-backup: after the user picks a backup file ONCE (File System
    // Access API -- Edge/Chrome), every later change is written to that
    // same file automatically; no more clicking Backup. The file handle is
    // persisted in IndexedDB so it survives page reloads (the browser may
    // ask once per session to re-allow access -- choose "Allow on every
    // visit" to make it fully silent). Browsers without the API (Firefox,
    // Safari) keep the old manual download behavior.
    const supportsAutoBackup = 'showSaveFilePicker' in window;
    let backupHandle = null;
    let backupTimer = null;

    function idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('life_diary_backup', 1);
        req.onupgradeneeded = () => req.result.createObjectStore('kv');
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, value) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(value, key);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }
    async function idbGet(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readonly');
        const req = tx.objectStore('kv').get(key);
        req.onsuccess = () => { db.close(); resolve(req.result); };
        req.onerror = () => { db.close(); reject(req.error); };
      });
    }
    async function idbDelete(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readwrite');
        tx.objectStore('kv').delete(key);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    function setBackupStatus(text, showOffLink) {
      document.getElementById('backupStatusNote').textContent = text;
      document.getElementById('backupOffRow').style.display = showOffLink ? 'block' : 'none';
    }

    async function writeBackupFile() {
      if (!backupHandle) return;
      try {
        const writable = await backupHandle.createWritable();
        await writable.write(JSON.stringify(loadEntries(), null, 2));
        await writable.close();
        setBackupStatus(`✅ Auto-backup ON -- all entries saved to "${backupHandle.name}" (last: ${new Date().toLocaleTimeString()}).`, true);
      } catch (err) {
        setBackupStatus(`⚠️ Auto-backup failed: ${err.message}. Click Backup to choose the file again.`, true);
      }
    }

    function scheduleAutoBackup() {
      if (!backupHandle) return;
      clearTimeout(backupTimer);
      backupTimer = setTimeout(writeBackupFile, 800);
    }

    function downloadBackup() {
      const data = JSON.stringify(loadEntries(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `life-diary-backup-${dateKey(new Date())}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById('backupBtn').addEventListener('click', async () => {
      if (!supportsAutoBackup) {
        downloadBackup();
        return;
      }
      let handle;
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: 'life-diary-backup.json',
          types: [{ description: 'JSON file', accept: { 'application/json': ['.json'] } }],
        });
      } catch (err) {
        if (err && err.name === 'AbortError') return; // user cancelled the picker
        // Picker blocked (e.g. iframe/permissions) -- fall back to download
        downloadBackup();
        return;
      }
      backupHandle = handle;
      document.getElementById('resumeBackupBtn').style.display = 'none';
      try {
        // Timeout guard: IndexedDB can hang entirely in some environments;
        // never let that block the first backup write.
        await withTimeout(idbSet('handle', handle), 3000, 'idb timeout');
      } catch {
        // Couldn't persist the handle (e.g. private browsing) -- auto-backup
        // still works for this session; it just won't survive a reload.
      }
      await writeBackupFile();
    });

    document.getElementById('resumeBackupBtn').addEventListener('click', async () => {
      let handle = null;
      try { handle = await withTimeout(idbGet('handle'), 3000, 'idb timeout'); } catch { /* treat as absent */ }
      if (!handle) return;
      try {
        const perm = await handle.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          backupHandle = handle;
          document.getElementById('resumeBackupBtn').style.display = 'none';
          await writeBackupFile();
        }
      } catch (err) {
        setBackupStatus(`⚠️ Could not resume auto-backup: ${err.message}. Click Backup to choose the file again.`, false);
      }
    });

    document.getElementById('disableBackupLink').addEventListener('click', async (e) => {
      e.preventDefault();
      if (!confirm('Turn off auto-backup? (Your existing backup file is kept; it just stops updating.)')) return;
      backupHandle = null;
      try { await withTimeout(idbDelete('handle'), 3000, 'idb timeout'); } catch { /* nothing to clear */ }
      document.getElementById('resumeBackupBtn').style.display = 'none';
      setBackupStatus('Auto-backup is OFF. Click Backup once to choose a backup file -- after that, every new entry is saved to it automatically.', false);
    });

    // On load: reconnect to the previously chosen backup file, if any.
    (async function initAutoBackup() {
      if (!supportsAutoBackup) {
        setBackupStatus('Backup downloads all entries as a JSON file (this browser does not support automatic backup -- use Edge or Chrome for that). Restore merges a backup file back in.', false);
        return;
      }
      let handle = null;
      try { handle = await withTimeout(idbGet('handle'), 3000, 'idb timeout'); } catch { /* first visit or idb unavailable */ }
      if (!handle) {
        setBackupStatus('Auto-backup is OFF. Click Backup once to choose a backup file -- after that, every new entry is saved to it automatically.', false);
        return;
      }
      try {
        const perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          backupHandle = handle;
          setBackupStatus(`✅ Auto-backup ON -- entries are being saved to "${handle.name}" automatically.`, true);
        } else {
          // Browser wants a fresh user gesture this session before writing.
          document.getElementById('resumeBackupBtn').style.display = 'inline-block';
          setBackupStatus(`Auto-backup is set up ("${handle.name}") but the browser needs your OK this session -- click "Resume Auto-Backup". (Tip: choose "Allow on every visit" to skip this.)`, true);
        }
      } catch {
        setBackupStatus('Auto-backup is OFF. Click Backup once to choose a backup file -- after that, every new entry is saved to it automatically.', false);
      }
    })();

    document.getElementById('restoreBtn').addEventListener('click', () => {
      document.getElementById('restoreFileInput').click();
    });

    document.getElementById('restoreFileInput').addEventListener('change', function () {
      const file = this.files[0];
      this.value = ''; // allow re-selecting the same file later
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        let incoming;
        try {
          incoming = JSON.parse(reader.result);
        } catch {
          alert('That file is not a valid diary backup (could not read JSON).');
          return;
        }
        if (typeof incoming !== 'object' || incoming === null || Array.isArray(incoming)) {
          alert('That file is not a valid diary backup (unexpected format).');
          return;
        }

        // Merge: keep existing entries, add backup entries, skip exact
        // duplicates (same date, timestamp, and text).
        const current = loadEntries();
        let added = 0;
        for (const [key, dayEntries] of Object.entries(incoming)) {
          if (!Array.isArray(dayEntries)) continue;
          if (!current[key]) current[key] = [];
          for (const e of dayEntries) {
            if (!e || typeof e.text !== 'string' || typeof e.t !== 'string') continue;
            const duplicate = current[key].some((c) => c.t === e.t && c.text === e.text);
            if (!duplicate) {
              current[key].push({ t: e.t, text: e.text });
              added++;
            }
          }
          current[key].sort((a, b) => a.t.localeCompare(b.t));
        }
        saveEntries(current);
        renderEntries();
        renderCalendar();
        alert(`Restore complete: ${added} entr${added === 1 ? 'y' : 'ies'} added.`);
      };
      reader.readAsText(file);
    });

    // ------------------------------ Summary --------------------------------
    // "How the day went": a local recap (always, instant, offline) plus an
    // AI-written narrative on top when the user has saved their own
    // Anthropic API key. The key is stored only in this browser's
    // localStorage and requests go straight from the browser to the
    // Anthropic API (which permits direct browser calls via the
    // anthropic-dangerous-direct-browser-access header) -- no server involved.
    const API_KEY_STORAGE = 'life_diary_api_key';

    function wordCount(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function renderLocalSummary(key, dayEntries) {
      const d = new Date(key + 'T12:00:00');
      const dateLabel = document.getElementById('summaryDateLabel');
      dateLabel.textContent = d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      dateLabel.style.color = isWeekendKey(key) ? 'var(--weekend)' : '';

      const totalWords = dayEntries.reduce((n, e) => n + wordCount(e.text), 0);
      const firstTime = formatTime(dayEntries[0].t);
      const lastTime = formatTime(dayEntries[dayEntries.length - 1].t);

      document.getElementById('summaryStats').innerHTML = `
        <span><strong>${dayEntries.length}</strong> entr${dayEntries.length === 1 ? 'y' : 'ies'}</span>
        <span>First: <strong>${firstTime}</strong></span>
        <span>Last: <strong>${lastTime}</strong></span>
        <span><strong>${totalWords}</strong> words</span>`;

      const timeline = document.getElementById('summaryTimeline');
      timeline.innerHTML = dayEntries.map(() => '<li><span class="t"></span><span class="txt"></span></li>').join('');
      const items = timeline.querySelectorAll('li');
      dayEntries.forEach((e, i) => {
        items[i].querySelector('.t').textContent = formatTime(e.t);
        // First sentence (or up to 120 chars) of each entry as the timeline line
        const firstLine = e.text.split(/\n/)[0];
        const brief = firstLine.length > 120 ? firstLine.slice(0, 117) + '...' : firstLine;
        items[i].querySelector('.txt').textContent = brief;
      });
    }

    async function fetchAiSummary(apiKey, key, dayEntries) {
      const d = new Date(key + 'T12:00:00');
      const entriesText = dayEntries
        .map((e) => `[${formatTime(e.t)}] ${e.text}`)
        .join('\n');

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: 'You are a warm, thoughtful journaling companion. Summarize the user\'s diary entries for one day into a short narrative (4-6 sentences) of how their day went: the overall arc, mood, and anything notable. Speak to the user as "you". Do not invent events that are not in the entries. End with one gentle, encouraging observation.',
          messages: [{
            role: 'user',
            content: `My diary entries for ${d.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}:\n\n${entriesText}\n\nPlease summarize how my day went.`,
          }],
        }),
      });

      if (!response.ok) {
        let apiMessage = '';
        try {
          const err = await response.json();
          apiMessage = err.error && err.error.message ? ` -- ${err.error.message}` : '';
        } catch { /* body not JSON */ }
        if (response.status === 401) {
          throw new Error('Your API key was rejected (invalid or revoked). Remove the saved key below and enter a new one.');
        }
        throw new Error(`API request failed (HTTP ${response.status})${apiMessage}`);
      }

      const data = await response.json();
      const textBlock = (data.content || []).find((b) => b.type === 'text');
      if (!textBlock) throw new Error('The API returned no text.');
      return textBlock.text;
    }

    function setAiUiState({ status, showKeyEntry, showManage, aiText }) {
      const note = document.getElementById('aiStatusNote');
      const textEl = document.getElementById('aiSummaryText');
      note.textContent = status || '';
      note.style.display = status ? 'block' : 'none';
      document.getElementById('aiKeyRow').style.display = showKeyEntry ? 'flex' : 'none';
      document.getElementById('aiKeyManageRow').style.display = showManage ? 'block' : 'none';
      textEl.style.display = aiText ? 'block' : 'none';
      if (aiText) textEl.textContent = aiText;
    }

    // Free on-device AI via the browser's built-in Summarizer API
    // (Chrome 138+/Edge -- Gemini Nano/Phi running locally). No API key, no
    // cost; the entries never leave the device. The model is downloaded once
    // by the browser on first use.
    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms)),
      ]);
    }

    // Google Gemini API, free tier -- the key is free (aistudio.google.com,
    // Google account only, no credit card) and the API allows direct
    // browser calls, so it works from a static page with no server.
    const GEMINI_KEY_STORAGE = 'life_diary_gemini_key';
    const GEMINI_MODELS = ['gemini-flash-latest', 'gemini-2.5-flash'];

    async function fetchGeminiSummary(geminiKey, key, dayEntries) {
      const d = new Date(key + 'T12:00:00');
      const entriesText = dayEntries.map((e) => `[${formatTime(e.t)}] ${e.text}`).join('\n');

    const body = JSON.stringify({
      system_instruction: {
        // Escaped the internal single quotes (\') so they don't break the string
        parts: [{ text: 'You are a warm, thoughtful journaling companion. Summarize the user\'s diary entries for one day into a short narrative (4-6 sentences) of how their day went: the overall arc, mood, and anything notable. Speak to the user as "you". If any entries contain these words than map it as \'Pammu\' to daughter, \'Vichu\' to son, \'Niju\' as Wife, \'Amma\' as mother, \'Achan\' as father, "Jeevass" as School. Do not invent events that are not in the entries. End with one gentle, encouraging observation.' }],
      },
      contents: [{
        parts: [{ text: `My diary entries for ${d.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}:\n\n${entriesText}\n\nPlease summarize how my day went.` }],
      }],
    });

      let lastError = null;
      for (const model of GEMINI_MODELS) {
        const response = await withTimeout(
          fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-goog-api-key': geminiKey },
            body,
          }),
          60000,
          'the Gemini API took too long to respond',
        );

        if (response.status === 404) { lastError = new Error(`model ${model} not found`); continue; }
        if (response.status === 400 || response.status === 401 || response.status === 403) {
          throw new Error('Your Gemini API key was rejected (invalid or restricted). Remove the saved key below and enter a new one from aistudio.google.com.');
        }
        if (response.status === 429) {
          throw new Error('The free Gemini quota is used up for now -- try again in a minute (or tomorrow if the daily limit is hit).');
        }
        if (!response.ok) { lastError = new Error(`Gemini API error (HTTP ${response.status})`); continue; }

        const data = await response.json();
        const parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
        const text = parts ? parts.map((p) => p.text || '').join('').trim() : '';
        if (!text) throw new Error('the Gemini API returned no text');
        return text;
      }
      throw lastError || new Error('no Gemini model responded');
    }

    async function fetchBrowserAiSummary(key, dayEntries) {
      // availability() should answer near-instantly; if it hangs (seen on
      // some setups), give up quickly and fall through to the other options
      // instead of leaving the status stuck on "Summarizing...".
      const availability = await withTimeout(Summarizer.availability(), 5000, 'on-device AI did not respond');
      if (availability === 'unavailable') {
        throw new Error('on-device AI unavailable');
      }

      const note = document.getElementById('aiStatusNote');
      const summarizer = await Summarizer.create({
        sharedContext: 'Personal diary entries written by one person over a single day, each line prefixed with the time it was written.',
        type: 'tldr',
        format: 'plain-text',
        length: 'medium',
        monitor(m) {
          m.addEventListener('downloadprogress', (e) => {
            note.textContent = `⬇️ Downloading the browser's built-in AI model (one-time): ${Math.round((e.loaded || 0) * 100)}%`;
          });
        },
      });

      try {
        const entriesText = dayEntries.map((e) => `[${formatTime(e.t)}] ${e.text}`).join('\n');
        // Generous cap: first use may include a model download + local
        // inference on modest hardware, but never leave the UI stuck forever.
        return await withTimeout(
          summarizer.summarize(entriesText, {
            context: 'Summarize how this person\'s day went overall -- the arc of the day and anything notable.',
          }),
          180000,
          'on-device summarization timed out',
        );
      } finally {
        summarizer.destroy();
      }
    }

    async function renderSummary() {
      const key = viewDateInput.value;
      const dayEntries = loadEntries()[key] || [];
      const panel = document.getElementById('summaryPanel');
      panel.style.display = 'block';

      if (dayEntries.length === 0) {
        const emptyLabel = document.getElementById('summaryDateLabel');
        emptyLabel.textContent =
          new Date(key + 'T12:00:00').toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        emptyLabel.style.color = isWeekendKey(key) ? 'var(--weekend)' : '';
        document.getElementById('summaryStats').innerHTML = '<span>No entries for this date -- nothing to summarize yet.</span>';
        document.getElementById('summaryTimeline').innerHTML = '';
        setAiUiState({ status: '', showKeyEntry: false, showManage: false, aiText: '' });
        return;
      }

      renderLocalSummary(key, dayEntries);

      const geminiKey = localStorage.getItem(GEMINI_KEY_STORAGE);
      const apiKey = localStorage.getItem(API_KEY_STORAGE);
      const anyKey = !!(geminiKey || apiKey);

      // 1st choice: Google Gemini with the user's free API key.
      if (geminiKey) {
        setAiUiState({ status: '✨ Writing your day\'s summary (Gemini, free)...', showKeyEntry: false, showManage: true, aiText: '' });
        try {
          const summary = await fetchGeminiSummary(geminiKey, key, dayEntries);
          setAiUiState({ status: '🆓 Written by Google Gemini (free tier).', showKeyEntry: false, showManage: true, aiText: summary });
          return;
        } catch (err) {
          setAiUiState({
            status: `Gemini summary unavailable: ${err.message}`,
            showKeyEntry: err.message.indexOf('rejected') !== -1,
            showManage: true,
            aiText: '',
          });
          if (err.message.indexOf('rejected') !== -1 || err.message.indexOf('quota') !== -1) return;
          // Other failures (network blip, model gone): fall through and try
          // the remaining options.
        }
      }

      // 2nd choice: the browser's free on-device AI (private, offline).
      if (typeof Summarizer !== 'undefined') {
        setAiUiState({ status: '✨ Summarizing on this device (free & private)...', showKeyEntry: false, showManage: anyKey, aiText: '' });
        try {
          const summary = await fetchBrowserAiSummary(key, dayEntries);
          setAiUiState({
            status: '🆓 Written by your browser\'s built-in AI -- free, and your entries never left this device.',
            showKeyEntry: false,
            showManage: anyKey,
            aiText: summary,
          });
          return;
        } catch (err) {
          // Not available on this machine -- fall through.
        }
      }

      // 3rd choice: Claude API, if the user saved an Anthropic key.
      if (apiKey) {
        setAiUiState({ status: '✨ Writing your day\'s summary...', showKeyEntry: false, showManage: true, aiText: '' });
        try {
          const summary = await fetchAiSummary(apiKey, key, dayEntries);
          setAiUiState({ status: '', showKeyEntry: false, showManage: true, aiText: summary });
        } catch (err) {
          setAiUiState({
            status: `AI summary unavailable: ${err.message}`,
            showKeyEntry: err.message.indexOf('rejected') !== -1,
            showManage: true,
            aiText: '',
          });
        }
        return;
      }

      // No key saved and no on-device AI: explain the free option.
      setAiUiState({
        status: 'For free AI summaries, get a FREE Google Gemini API key: open aistudio.google.com, sign in with your Google account, click "Get API key" and create one (no credit card, no payment). Paste it below -- it is saved only in this browser, so avoid shared computers.',
        showKeyEntry: true,
        showManage: false,
        aiText: '',
      });
    }

    document.getElementById('summaryBtn').addEventListener('click', renderSummary);

    document.getElementById('saveApiKeyBtn').addEventListener('click', () => {
      const input = document.getElementById('apiKeyInput');
      const key = input.value.trim();
      if (!key) { input.focus(); return; }
      // Auto-detect the provider from the key format: Google keys start
      // with "AIza", Anthropic keys with "sk-ant-".
      if (key.indexOf('sk-ant-') === 0) {
        localStorage.setItem(API_KEY_STORAGE, key);
      } else {
        localStorage.setItem(GEMINI_KEY_STORAGE, key);
      }
      input.value = '';
      renderSummary(); // re-run, now with the AI half
    });

    document.getElementById('clearApiKeyLink').addEventListener('click', (e) => {
      e.preventDefault();
      if (!confirm('Remove the saved API key(s) from this browser?')) return;
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem(GEMINI_KEY_STORAGE);
      renderSummary();
    });

    // Hide the summary panel when switching dates so a stale summary never
    // sits under a different date's entries.
    viewDateInput.addEventListener('change', () => {
      document.getElementById('summaryPanel').style.display = 'none';
    });

    // ------------------------------- Init ---------------------------------
    renderEntries();
    renderCalendar();
  </script>
</body>
</html>
