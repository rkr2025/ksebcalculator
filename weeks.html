<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏳ Your Life in Weeks</title>
  <style>
    :root {
      --primary: #2a78d6;
      --primary-dark: #1f5fac;
      --primary-light: #eaf2fc;
      --accent: #1baf7a;
      --danger: #e34948;
      --warn: #c97e00;
      --surface: #ffffff;
      --surface-muted: #f6f8fb;
      --border: #e3e7ef;
      --text-primary: #17203a;
      --text-secondary: #52514e;
      --text-muted: #898781;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.08);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Roboto, -apple-system, sans-serif;
      text-align: center;
      margin: 0;
      padding: 16px 10px 32px;
      font-size: 16px;
      background: linear-gradient(160deg, #eef1f7, #e4ebf7 60%);
      color: var(--text-primary);
    }
    h1 {
      margin: 4px 0 18px;
      font-size: 1.6em;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .input-section {
      margin: 0 auto 16px;
      max-width: 480px;
      background: var(--surface);
      border: none;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .input-section label {
      display: inline-block;
      margin: 6px 8px 6px 0;
      font-weight: 600;
      font-size: 0.9em;
      color: var(--text-secondary);
    }
    .input-section input,
    .input-section select {
      margin: 6px 12px 6px 0;
      padding: 8px 10px;
      font-size: 0.95em;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
    }
    .input-section input:focus,
    .input-section select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .setup-intro {
      margin: 0 0 14px;
      color: var(--text-muted);
      font-size: 0.9em;
      line-height: 1.5;
    }
    #countdownTimer {
      display: none;
      max-width: 480px;
      margin: 0 auto 16px;
      background: linear-gradient(160deg, #0c1826, #16273d 60%, #0e1c2e);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
    }
    .countdown-label {
      font-size: 0.75em;
      color: #7ba3c4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .countdown-digits {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      font-family: "Consolas", "Courier New", monospace;
    }
    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 3.4em;
    }
    .countdown-unit span {
      font-size: 1.8em;
      font-weight: bold;
      color: #5fe0ff;
      text-shadow: 0 0 6px rgba(95, 224, 255, 0.5);
      line-height: 1.1;
    }
    .countdown-unit small {
      font-size: 0.6em;
      color: #7ba3c4;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .countdown-colon {
      font-size: 1.8em;
      font-weight: bold;
      color: #5fe0ff;
      margin-top: 0.05em;
    }
    @media (max-width: 600px) {
      .countdown-unit span,
      .countdown-colon {
        font-size: 1.3em;
      }
      .countdown-unit {
        min-width: 2.6em;
      }
    }
    button {
      margin: 5px;
      padding: 9px 16px;
      font-size: 0.9em;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter .15s ease, transform .1s ease;
      background: var(--surface-muted);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    button:hover { filter: brightness(0.96); }
    button:active { transform: translateY(1px); }
    .input-section button {
      background: var(--accent);
      color: #fff;
      border: none;
    }
    #summaryBar {
      display: none;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px 16px;
      max-width: 720px;
      margin: 0 auto 14px;
      padding: 12px 18px;
      background: var(--surface);
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 0.9em;
    }
    #summaryBar strong { color: var(--primary-dark); }
    #summaryBar button {
      background: var(--primary-light);
      color: var(--primary-dark);
      border: none;
      padding: 5px 12px;
      font-size: 0.85em;
      margin: 0;
    }
    .legend {
      display: none;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px 16px;
      margin-bottom: 14px;
      font-size: 0.8em;
      color: var(--text-muted);
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }
    .legend-swatch.lived { background-color: var(--accent); }
    .legend-swatch.future { background-color: #B0BEC5; }
    .legend-swatch.goal-set { background-color: #FFCA28; }
    .legend-swatch.current-week-swatch { background-color: #fff; border: 2px solid var(--danger); }
    .grid {
      display: inline-block;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
      position: relative;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px;
    }
    .year-row {
      display: flex;
      align-items: center;
    }
    .week-box {
      width: 2.5vw;
      height: 2.5vw;
      min-width: 15px;
      min-height: 15px;
      border-radius: 3px;
      border: 1px solid var(--border);
      margin: 1.5px;
      background-color: var(--surface);
      cursor: pointer;
      position: relative;
      font-size: 0.6em;
      line-height: 1;
      padding-top: 2px;
      transition: transform .12s ease;
    }
    .week-box:hover {
      transform: scale(1.15);
      z-index: 2;
      box-shadow: 0 2px 6px rgba(16,24,40,.2);
    }
    .week-box span.week-number {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7em;
    }
    .week-box span.age {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5em;
      color: var(--text-muted);
    }
    .lived {
      background-color: var(--accent);
    }
    .lived span.age { color: rgba(255,255,255,.85); }
    .future {
      background-color: #dfe6ee;
    }
    .goal-set {
      background-color: #FFCA28;
    }
    .current-week {
      border: 2px solid var(--danger);
    }
    .year-label {
      width: 5vw;
      min-width: 34px;
      margin-right: 6px;
      text-align: right;
      font-size: 0.85em;
      font-weight: 700;
      color: var(--text-secondary);
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 3;
      padding-right: 2px;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 20, 32, 0.55);
      backdrop-filter: blur(2px);
      z-index: 999;
    }
    #goalModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 20px 50px rgba(0,0,0,.3);
      max-width: 90vw;
      width: 420px;
      text-align: left;
      font-size: 0.9em;
      z-index: 1000;
      max-height: 85vh;
      overflow-y: auto;
    }
    #goalModal h3 {
      margin: 0 0 10px;
      font-size: 1.1em;
    }
    #goalInput, .day-goal {
      width: 100%;
      margin: 5px 0;
      font-size: 0.9em;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
    }
    #goalInput:focus, .day-goal:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .info {
      margin-bottom: 5px;
      color: var(--text-secondary);
    }
    .day-goals {
      margin-top: 10px;
    }
    #goalModal button:nth-of-type(1) { background: var(--accent); color: #fff; border: none; } /* Save All */
    #goalModal button:nth-of-type(2) { background: var(--surface-muted); color: var(--danger); } /* Delete */
    #goalModal button:nth-of-type(3) { background: var(--surface-muted); color: var(--text-secondary); } /* Close */

    @media (max-width: 600px) {
      .week-box {
        width: 6.2vw;
        height: 6.2vw;
        min-width: 22px;
        min-height: 22px;
      }
      .week-box span.week-number {
        font-size: 0.62em;
      }
      .week-box span.age {
        font-size: 0.42em;
      }
      .year-label {
        width: 9vw;
        min-width: 30px;
        font-size: 0.78em;
      }
      #goalModal {
        max-width: 92vw;
        width: auto;
        padding: 14px;
      }
      button {
        padding: 8px 12px;
      }
      #summaryBar {
        font-size: 0.8em;
        padding: 10px 14px;
      }
    }
    .nav-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 13.5px;
    }
    @media print {
      body { background: none; }
      .nav-link { display: none; }
    }
  </style>
</head>
<body>
  <h1>⏳ Your Life in Weeks</h1>

  <div id="countdownTimer">
    <div class="countdown-label">⏳ Estimated Time Remaining</div>
    <div class="countdown-digits">
      <div class="countdown-unit"><span id="cdDays">0</span><small>Days</small></div>
      <span class="countdown-colon">:</span>
      <div class="countdown-unit"><span id="cdHours">00</span><small>Hours</small></div>
      <span class="countdown-colon">:</span>
      <div class="countdown-unit"><span id="cdMinutes">00</span><small>Minutes</small></div>
      <span class="countdown-colon">:</span>
      <div class="countdown-unit"><span id="cdSeconds">00</span><small>Seconds</small></div>
    </div>
  </div>

  <div class="input-section" id="setupSection">
    <p class="setup-intro">Enter your date of birth once to generate your chart -- it's remembered on this device, so you won't be asked again.</p>
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" required>
    <label for="lifespan">Lifespan (Years):</label>
    <select id="lifespan">
      <option value="50">50</option>
      <option value="55">55</option>
      <option value="60">60</option>
      <option value="65">65</option>
      <option value="70">70</option>
      <option value="75">75</option>
      <option value="80">80</option>
      <option value="85">85</option>
      <option value="90" selected>90</option>
      <option value="95">95</option>
      <option value="100">100</option>
    </select>
    <br>
    <button onclick="generateGrid()">💾 Save &amp; Generate</button>
  </div>

  <div id="summaryBar">
    <span id="summaryText"></span>
    <button onclick="editSetup()">✏️ Edit</button>
  </div>

  <div class="legend" id="legend">
    <span class="legend-item"><span class="legend-swatch lived"></span> Lived</span>
    <span class="legend-item"><span class="legend-swatch current-week-swatch"></span> Current Week</span>
    <span class="legend-item"><span class="legend-swatch goal-set"></span> Goal Set</span>
    <span class="legend-item"><span class="legend-swatch future"></span> Future</span>
  </div>

  <div id="gridContainer"></div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div id="goalModal">
    <h3>📅 Week Details</h3>
    <div class="info" id="weekNumberInfo"></div>
    <div class="info" id="dateRangeInfo"></div>
    <div class="info" id="currentWeekInfo"></div>
    <div class="info" id="timePassedInfo"></div>
    <div class="info" id="timeLeftInfo"></div>
    <div class="day-goals" id="dayGoals"></div>
    <button onclick="saveGoals()">💾 Save All</button>
    <button onclick="deleteGoals()">🗑️ Delete</button>
    <button onclick="closeModal()">✕ Close</button>
  </div>

  <a href="tools.html" class="nav-link">← Back to Tools</a>

  <script>
    // Date of birth (and lifespan) are only ever asked for once: if they're
    // already in localStorage from a previous visit, skip the setup form
    // entirely and generate the chart right away. The setup form stays
    // reachable afterwards via the "Edit" button in the summary bar, in
    // case the user needs to correct their date of birth or lifespan.
    document.addEventListener('DOMContentLoaded', () => {
      const savedDob = localStorage.getItem('dob');
      const savedLifespan = localStorage.getItem('lifespan');
      const dobInput = document.getElementById('dob');
      const lifespanInput = document.getElementById('lifespan');

      if (savedDob) {
        dobInput.value = savedDob;
        if (savedLifespan) lifespanInput.value = savedLifespan;
        generateGrid();
      } else {
        document.getElementById('setupSection').style.display = 'block';
      }
    });

    function editSetup() {
      document.getElementById('setupSection').style.display = 'block';
      document.getElementById('dob').focus();
    }

    function updateSummaryBar(dob, lifespan, weeksLived, totalWeeks) {
      const weeksLeft = Math.max(0, totalWeeks - weeksLived);
      const pct = Math.min(100, (weeksLived / totalWeeks) * 100).toFixed(1);
      document.getElementById('summaryText').innerHTML =
        `🎂 Born <strong>${dob.toLocaleDateString()}</strong> &nbsp;|&nbsp; ` +
        `Lifespan <strong>${lifespan} yrs</strong> &nbsp;|&nbsp; ` +
        `<strong>${weeksLived}</strong> weeks lived (${pct}%) &nbsp;|&nbsp; ` +
        `<strong>${weeksLeft}</strong> weeks remaining`;
      document.getElementById('summaryBar').style.display = 'flex';
      document.getElementById('legend').style.display = 'flex';
    }

    // Live days:hours:minutes:seconds countdown to the end of life
    // expectancy (dob + lifespan years) -- a visceral, second-by-second
    // visual companion to the weeks grid above. Re-reads dob/lifespan from
    // the (hidden, saved) form fields on every tick rather than closing
    // over stale values, so it stays correct if the user edits and
    // regenerates. The interval is cleared/recreated on every
    // generateGrid() call so re-generating never stacks duplicate timers.
    let countdownIntervalId = null;

    function tickCountdown() {
      const dobVal = document.getElementById('dob').value;
      const lifespanVal = parseInt(document.getElementById('lifespan').value);
      if (!dobVal || !lifespanVal) return;

      const dob = new Date(dobVal);
      const endOfLife = new Date(dob);
      endOfLife.setFullYear(dob.getFullYear() + lifespanVal);

      const msLeft = Math.max(0, endOfLife - new Date());
      const totalSeconds = Math.floor(msLeft / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById('cdDays').textContent = String(days);
      document.getElementById('cdHours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cdMinutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('cdSeconds').textContent = String(seconds).padStart(2, '0');
    }

    function startCountdown() {
      tickCountdown();
      if (countdownIntervalId) clearInterval(countdownIntervalId);
      countdownIntervalId = setInterval(tickCountdown, 1000);
      document.getElementById('countdownTimer').style.display = 'block';
    }

    function generateGrid() {
      const dobInput = document.getElementById('dob').value;
      const lifespan = parseInt(document.getElementById('lifespan').value);
      const gridContainer = document.getElementById('gridContainer');
      gridContainer.innerHTML = '';

      if (!dobInput) {
        alert('Please enter your date of birth.');
        return;
      }

      // Save dob and lifespan to localStorage so they're only ever asked
      // for once -- next visit skips straight to the chart.
      localStorage.setItem('dob', dobInput);
      localStorage.setItem('lifespan', lifespan);
      document.getElementById('setupSection').style.display = 'none';

      const dob = new Date(dobInput);
      const today = new Date(); // Dynamic current date and time: 03:05 PM IST, August 04, 2025
      const msPerDay = 1000 * 60 * 60 * 24;
      const msPerWeek = 7 * msPerDay;
      const totalWeeks = lifespan * 52;
      const msLived = today - dob;
      const daysLived = Math.floor(msLived / msPerDay);
      const weeksLived = Math.floor(daysLived / 7);
      // Calculate current week by finding the week containing today
      const daysSinceBirth = Math.floor((today - dob) / msPerDay);
      const currentWeek = Math.floor(daysSinceBirth / 7) + 1; // Week containing today
      const startYear = dob.getFullYear();
      const endYear = startYear + lifespan - 1;

      for (let year = startYear; year <= endYear; year++) {
        const yearRow = document.createElement('div');
        yearRow.className = 'year-row';
        const yearLabel = document.createElement('div');
        yearLabel.className = 'year-label';
        yearLabel.textContent = year;
        yearRow.appendChild(yearLabel);

        for (let week = 1; week <= 52; week++) {
          const weekIndex = ((year - startYear) * 52) + week;
          const weekBox = document.createElement('div');
          weekBox.className = 'week-box';
          const weekSpan = document.createElement('span');
          weekSpan.className = 'week-number';
          weekSpan.textContent = weekIndex;
          weekBox.appendChild(weekSpan);
          // Calculate age for this week
          const startDate = new Date(dob);
          startDate.setDate(dob.getDate() + (weekIndex - 1) * 7);
          const dayOfWeek = startDate.getDay();
          const daysToMonday = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek);
          startDate.setDate(startDate.getDate() + daysToMonday);
          const age = new Date(startDate).getFullYear() - dob.getFullYear() - (new Date(startDate) < new Date(dob.getFullYear() + 1, dob.getMonth(), dob.getDate()) ? 1 : 0);
          const ageSpan = document.createElement('span');
          ageSpan.className = 'age';
          ageSpan.textContent = age >= 0 ? age : 0;
          weekBox.appendChild(ageSpan);
          weekBox.dataset.week = weekIndex;
          weekBox.dataset.year = year;
          if (weekIndex <= weeksLived) {
            weekBox.classList.add('lived');
          } else if (weekIndex > totalWeeks) {
            break;
          } else {
            weekBox.classList.add('future');
          }
          const savedGoal = localStorage.getItem(`goal_${weekIndex}_weekly`) || localStorage.getItem(`goal_${weekIndex}`);
          if (savedGoal) weekBox.classList.add('goal-set');
          if (weekIndex === currentWeek) {
            weekBox.classList.add('current-week');
          }
          weekBox.addEventListener('click', showGoalModal);
          yearRow.appendChild(weekBox);
        }
        gridContainer.appendChild(yearRow);
      }

      updateSummaryBar(dob, lifespan, weeksLived, totalWeeks);
      startCountdown();
    }

    function showGoalModal(event) {
      const weekBox = event.target.closest('.week-box'); // Ensure we get the box even if span is clicked
      const weekNumber = parseInt(weekBox.dataset.week);
      const dob = new Date(document.getElementById('dob').value);
      const lifespan = parseInt(document.getElementById('lifespan').value);
      const today = new Date(); // Dynamic current date and time: 03:05 PM IST, August 04, 2025
      const msPerDay = 1000 * 60 * 60 * 24;
      const msPerWeek = 7 * msPerDay;
      const daysLived = Math.floor((today - dob) / msPerDay);
      const weeksLived = Math.floor(daysLived / 7);
      const daysSinceBirth = Math.floor((today - dob) / msPerDay); // Recalculate here
      const currentWeek = Math.floor(daysSinceBirth / 7) + 1; // Week containing today

      // Calculate start and end dates for the week (starting on Monday)
      const startDate = new Date(dob);
      startDate.setDate(dob.getDate() + (weekNumber - 1) * 7);
      const dayOfWeek = startDate.getDay(); // 0 = Sunday, 1 = Monday, etc.
      const daysToMonday = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek); // Adjust to previous Monday
      startDate.setDate(startDate.getDate() + daysToMonday);
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 6);

      // Time passed
      const msPassed = Math.max(0, startDate - dob); // Ensure no negative time
      const yearsPassed = Math.floor(msPassed / (1000 * 60 * 60 * 24 * 365.25));
      const daysPassed = Math.floor(msPassed / msPerDay);
      const hoursPassed = Math.floor(msPassed / (1000 * 60 * 60));
      const minutesPassed = Math.floor(msPassed / (1000 * 60));

      // Time until end of life expectancy
      const endOfLife = new Date(dob);
      endOfLife.setFullYear(dob.getFullYear() + lifespan);
      const msLeft = Math.max(0, endOfLife - startDate); // Ensure no negative time
      const yearsLeft = Math.floor(msLeft / (1000 * 60 * 60 * 24 * 365.25));
      const daysLeft = Math.floor(msLeft / msPerDay);
      const hoursLeft = Math.floor(msLeft / (1000 * 60 * 60));
      const minutesLeft = Math.floor(msLeft / (1000 * 60));

      document.getElementById('weekNumberInfo').textContent = `Week Number: ${weekNumber}`;
      document.getElementById('dateRangeInfo').textContent = `Date Range: ${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}`;
      document.getElementById('currentWeekInfo').textContent = `Current Week: ${currentWeek} (as of ${today.toLocaleDateString()} ${today.toLocaleTimeString()})`;
      document.getElementById('timePassedInfo').textContent = `Time Passed: ${yearsPassed} yrs, ${daysPassed % 365} days (${hoursPassed} hrs, ${minutesPassed} mins)`;
      document.getElementById('timeLeftInfo').textContent = `Time Left: ${yearsLeft} yrs, ${daysLeft % 365} days (${hoursLeft} hrs, ${minutesLeft} mins) until ${endOfLife.toLocaleDateString()}`;

      // Daily and weekly goals
      const dayGoalsContainer = document.getElementById('dayGoals');
      dayGoalsContainer.innerHTML = '';
      const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      // Add weekly goal input
      const weeklyInput = document.createElement('input');
      weeklyInput.type = 'text';
      weeklyInput.className = 'day-goal';
      weeklyInput.placeholder = `Your goal for this week (${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()})`;
      weeklyInput.value = localStorage.getItem(`goal_${weekNumber}_weekly`) || '';
      dayGoalsContainer.appendChild(weeklyInput);
      // Add daily goal inputs
      for (let i = 0; i < 7; i++) {
        const dayDate = new Date(startDate);
        dayDate.setDate(startDate.getDate() + i);
        const dayKey = `goal_${weekNumber}_${days[i]}`;
        const savedGoal = localStorage.getItem(dayKey) || '';
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'day-goal';
        input.placeholder = `${days[i]} (${dayDate.toLocaleDateString()})`;
        input.value = savedGoal;
        dayGoalsContainer.appendChild(input);
      }

      document.getElementById('goalModal').style.display = 'block';
      document.getElementById('modalOverlay').style.display = 'block';
    }

    function saveGoals() {
      const weekNumber = parseInt(document.getElementById('weekNumberInfo').textContent.split(': ')[1]);
      const dayInputs = document.querySelectorAll('.day-goal');
      if (dayInputs.length === 0) return; // Safeguard if no inputs are found
      // Save weekly goal
      const weeklyInput = dayInputs[0]; // First input is the weekly goal
      const weeklyKey = `goal_${weekNumber}_weekly`;
      localStorage.setItem(weeklyKey, weeklyInput.value || '');
      // Save daily goals
      for (let i = 1; i < dayInputs.length; i++) {
        const input = dayInputs[i];
        const dayName = input.placeholder.split(' (')[0];
        const dayKey = `goal_${weekNumber}_${dayName}`;
        localStorage.setItem(dayKey, input.value || '');
      }
      const weekBox = document.querySelector(`.week-box[data-week="${weekNumber}"]`);
      const hasGoals = Array.from(dayInputs).some(input => input.value);
      if (hasGoals) {
        weekBox.classList.add('goal-set');
        weekBox.classList.remove('lived', 'future', 'current-week');
      } else {
        weekBox.classList.remove('goal-set');
        const dob = new Date(document.getElementById('dob').value);
        const today = new Date();
        const msPerDay = 1000 * 60 * 60 * 24;
        const daysLived = Math.floor((today - dob) / msPerDay);
        const weeksLived = Math.floor(daysLived / 7);
        if (weekNumber <= weeksLived) weekBox.classList.add('lived');
        else weekBox.classList.add('future');
        const currentWeek = Math.floor(daysLived / 7) + 1;
        if (weekNumber === currentWeek) weekBox.classList.add('current-week');
      }
      closeModal();
    }

    function deleteGoals() {
      const weekNumber = parseInt(document.getElementById('weekNumberInfo').textContent.split(': ')[1]);
      const dayInputs = document.querySelectorAll('.day-goal');
      if (dayInputs.length === 0) return; // Safeguard if no inputs are found
      // Delete weekly goal
      const weeklyKey = `goal_${weekNumber}_weekly`;
      localStorage.removeItem(weeklyKey);
      dayInputs[0].value = ''; // Clear weekly input
      // Delete daily goals
      for (let i = 1; i < dayInputs.length; i++) {
        const input = dayInputs[i];
        const dayName = input.placeholder.split(' (')[0];
        const dayKey = `goal_${weekNumber}_${dayName}`;
        localStorage.removeItem(dayKey);
        input.value = '';
      }
      const weekBox = document.querySelector(`.week-box[data-week="${weekNumber}"]`);
      weekBox.classList.remove('goal-set');
      const dob = new Date(document.getElementById('dob').value);
      const today = new Date();
      const msPerDay = 1000 * 60 * 60 * 24;
      const daysLived = Math.floor((today - dob) / msPerDay);
      const weeksLived = Math.floor(daysLived / 7);
      if (weekNumber <= weeksLived) weekBox.classList.add('lived');
      else weekBox.classList.add('future');
      const currentWeek = Math.floor(daysLived / 7) + 1;
      if (weekNumber === currentWeek) weekBox.classList.add('current-week');
      closeModal();
    }

    function closeModal() {
      document.getElementById('goalModal').style.display = 'none';
      document.getElementById('modalOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
